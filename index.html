<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <link rel="apple-touch-startup-image" href="Tenora Icon.jpg"> 
  <meta name="theme-color" content="#2c3e50">

  <style>
    /* 1. FONT & BASE: Reverted to Original Clean SaaS Font */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. GRADIENT LOADER */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 50; transition: opacity 0.6s ease-in-out;
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    
    .tag {
      display: block; 
      font-size: 13px; 
      font-weight: 300; 
      letter-spacing: 0.4em;
      text-transform: uppercase; 
      margin: 15px 0; 
      /* CRITICAL FIX: Ensure they start completely invisible and shifted down */
      opacity: 0; 
      transform: translateY(15px);
      transition: all 0.7s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    /* Animation Class */
    .tag.visible { opacity: 0.85; transform: translateY(0); }

    /* 3. THE APP FRAME */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.01);
      /* CRITICAL FIX: Matches theme to kill the 'white flash' before the app renders */
      background-color: #2c3e50; 
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0, 0, 1);
    }
    
    iframe.active { opacity: 1; transform: scale(1); }
    .hidden { opacity: 0 !important; pointer-events: none; }
  </style>
</head>
<body>

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtswzQfmFNspjOvb2RyANolbfnU9zJrUmCdkN5U9uZU58g0QF-ZAJlBtywGg9rDT4q/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    // CONFIG: Adjusted delays for "OS-to-Branding" handoff
    const START_DELAY = 450; // Pause after OS splash clears to ensure we see the animation
    const STAGGER = 300;     // Time between words

    let animationFinished = false;
    let scriptLoaded = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // 1. DISPATCH SCRIPT IMMEDIATELY
    if (!isIOS) { 
      frame.src = SCRIPT_URL; 
      frame.onload = () => {
        scriptLoaded = true;
        checkReadyState();
      };
    }

    // 2. STAGGERED ANIMATION LOGIC
    function runAnimations() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
    
      // Initial wait so the user perceives the gradient before words fly in
      setTimeout(() => {
        tags.forEach((tag, index) => {
          setTimeout(() => { 
            tag.classList.add('visible'); 
            
            // Final word check
            if(index === 2) {
              setTimeout(() => {
                animationFinished = true;
                checkReadyState();
              }, 800); 
            }
          }, STAGGER * index); 
        });
      }, START_DELAY);

      if (isIOS) {
        setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1400);
      }
    }

    // 3. THE HAND-OFF GATEKEEPER
    function checkReadyState() {
      // If animation is done AND script has responded
      if (animationFinished && scriptLoaded) {
        loader.classList.add('hidden');
        frame.classList.add('active');
        console.log("Tenora SaaS: Hand-off complete.");
      } 
      // If animation is done but script is slow
      else if (animationFinished && !scriptLoaded) {
        document.getElementById('tag3').innerText = "Connecting...";
        document.getElementById('tag3').style.opacity = "0.5";
      }
    }

    // Start as soon as the wrapper DOM is ready
    document.addEventListener('DOMContentLoaded', runAnimations);
  </script>
</body>
</html>
