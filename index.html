<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #ffffff; }

    /* STAGE 1: BRANDING LOADER (Gradient) - Sits on top */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 50; 
      /* Smooth fade out when app is ready */
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    .tag {
      display: block; font-size: 13px; font-weight: 300; letter-spacing: 0.4em;
      text-transform: uppercase; margin: 12px 0; opacity: 0;
      transform: translateY(15px);
      /* Slower tagline entrance for 'executive' feel */
      transition: all 0.8s cubic-bezier(0.2, 0, 0, 1); 
    }
    .tag.visible { opacity: 0.8; transform: translateY(0); }

    /* STAGE 2: THE LIVE APP (Iframe) - Fades in behind/with the loader */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.02);
      transition: opacity 1s ease, transform 1.2s cubic-bezier(0.2, 0, 0, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }
    
    /* Global hidden class */
    .hidden { opacity: 0 !important; pointer-events: none; }
  </style>
</head>
<body>

  <!-- Note: #white-splash removed to avoid redundancy with OS splash -->

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtswzQfmFNspjOvb2RyANolbfnU9zJrUmCdkN5U9uZU58g0QF-ZAJlBtywGg9rDT4q/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // 1. Parallel Trigger: Load script immediately
    if (!isIOS) { 
      frame.src = SCRIPT_URL; 
      frame.onload = () => {
        scriptLoaded = true;
        checkReadyState();
      };
    }

    // 2. Animation Sequence
    function runAnimations() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
    
      // Slight delay (400ms) ensures the OS Splash has finished before tags move
      setTimeout(() => {
        tags.forEach((tag, index) => {
          setTimeout(() => { 
            tag.classList.add('visible'); 
            
            if(index === 2) {
              setTimeout(() => {
                animationFinished = true;
                checkReadyState();
              }, 1000); // Hold the 'Confidence' state for 1s
            }
          }, 400 * index); // Slower stagger for more impact
        });
    
        if (isIOS) {
          setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1500);
        }
      }, 400); 
    }

    // 3. The Transition Gatekeeper
    function checkReadyState() {
      // Transit only when tags are finished AND script is loaded
      if (animationFinished && scriptLoaded) {
        // Cross-fade: Loader goes to 0 opacity, Frame comes to 1
        loader.classList.add('hidden');
        frame.classList.add('active');
        console.log("Tenora SaaS: Hand-off complete.");
      } else if (animationFinished && !scriptLoaded) {
        // Slow internet: Keep branding on screen
        document.getElementById('tag3').innerText = "Connecting...";
      }
    }

    window.addEventListener('load', runAnimations);
  </script>
</body>
</html>
