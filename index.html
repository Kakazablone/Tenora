<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <!-- SEO & PWA Meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* 1. BASE: Exactly as your original */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }

    /* 2. GRADIENT LOADER: Preserving your exact branding */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; 
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    
    .tag {
      display: block; 
      font-size: 13px; 
      font-weight: 300; 
      letter-spacing: 0.5em;
      text-transform: uppercase; 
      margin: 18px 0; 
      opacity: 0; 
      transform: translateY(20px);
      transition: opacity 1.5s ease-out, transform 1.2s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    .tag.visible { opacity: 0.75; transform: translateY(0); }

    /* 3. FLOAT ANIMATION: Heartbeat effect preserved */
    .tag.floaty {
      animation: floatBreath 4s ease-in-out infinite;
    }

    @keyframes floatBreath {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(-6px); opacity: 0.95; }
    }
  </style>
</head>
<body>

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <script>
    /**
     * CONFIGURATION
     * We use window.location.replace() to "hand off" the user to the GAS app.
     * This makes the GAS app the top-level window, enabling Pull-To-Refresh.
     */
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbVLsjS0MYUKjkaVVWUd49X6jrAuBaa2gn8BG6dPvasSYXSIKt3p-Z94phh4qsWY6s/exec";
    
    // Check if the user is returning from a session
    const isPWA = window.matchMedia('(display-mode: standalone)').matches;

    document.addEventListener('DOMContentLoaded', function() {
      const tags = [
        document.getElementById('tag1'), 
        document.getElementById('tag2'), 
        document.getElementById('tag3')
      ];
    
      // Start Cinematic Staggered Entrance
      tags.forEach((tag, index) => {
        setTimeout(() => { 
          tag.classList.add('visible'); 
          
          // Start the float animation
          setTimeout(() => { tag.classList.add('floaty'); }, 1500);

          // If we have reached the last tag ("Confidence")
          if(index === 2) {
            // Wait 2 seconds for the user to see the full tagline
            setTimeout(() => {
              launchApp();
            }, 2000); 
          }
        }, 80 + (500 * index)); 
      });
    });

    /**
     * THE SEAMLESS HAND-OFF
     * We fade out the loader and then redirect.
     * Using location.replace ensures the "Loader" page is removed from history,
     * so clicking "Back" or "Refresh" stays inside the GAS App.
     */
    function launchApp() {
      const loader = document.getElementById('gradient-loader');
      
      // Begin fade out
      loader.style.opacity = "0";

      // Execute redirect after fade starts
      setTimeout(() => {
        // .replace is critical: it prevents the "back button" loop
        window.location.replace(SCRIPT_URL);
      }, 1000);
    }

    // Backup: If for some reason the animation fails to trigger the redirect
    // (e.g. background tab), force redirect after 8 seconds.
    setTimeout(() => {
       if (window.location.href.indexOf('github.io') > -1) {
          window.location.replace(SCRIPT_URL);
       }
    }, 8000);
  </script>
</body>
</html>
