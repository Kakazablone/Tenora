<!DOCTYPE html>
<html lang="en" style="background-color: #ffffff;">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  
  <!-- 1. PERFORMANCE & CONNECTIVITY -->
  <link rel="preconnect" href="https://script.google.com">
  <link rel="dns-prefetch" href="https://script.google.com">
  
  <!-- 2. PWA IDENTITY -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #ffffff; }

    /* STAGE 1: APP SHELL SPLASH (Instant via Cache) */
    #white-splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff; display: flex; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 0.4s ease-out;
    }
    #white-splash img { width: 120px; height: auto; }

    /* STAGE 2: BRANDING LOADER (Gradient) */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 50; transition: opacity 0.6s ease-in-out;
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    .tag {
      display: block; font-size: 13px; font-weight: 300; letter-spacing: 0.4em;
      text-transform: uppercase; margin: 12px 0; opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s cubic-bezier(0.2, 0, 0, 1); 
    }
    .tag.visible { opacity: 0.8; transform: translateY(0); }

    /* STAGE 3: THE LIVE APP (Iframe) */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.02);
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0, 0, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }
    .hidden { opacity: 0 !important; pointer-events: none; }
  </style>
</head>
<body>

  <!-- Instant Cache Splash -->
  <div id="white-splash">
    <img src="Tenora Icon.jpg" alt="Tenora">
  </div>

  <!-- Branding Sync Stage -->
  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/library/d/1CuPanPWqB_ZyPm0_C8Am1J2fFrJlRQvT3UQAadF1lr4qKrJXD68DjoqX/24";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // 1. SERVICE WORKER REGISTRATION (App Shell Caching)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Tenora: PWA Shell Offline Ready'))
          .catch(err => console.log('Tenora: PWA Offline Error', err));
      });
    }

    // 2. PARALLEL TRIGGER: Start loading the Script immediately
    if (!isIOS) { 
      frame.src = SCRIPT_URL; 
      frame.onload = () => {
        scriptLoaded = true;
        checkReadyState();
      };
    }

    // 3. ANIMATION SEQUENCE
    function runAnimations() {
      const splash = document.getElementById('white-splash');
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
    
      // Quick Hand-off from logo to gradient
      setTimeout(() => {
        splash.classList.add('hidden');
        
        // Staggered tag reveal
        tags.forEach((tag, index) => {
          setTimeout(() => { 
            tag.classList.add('visible'); 
            
            // Mark animation as complete after the last word settles
            if(index === 2) {
              setTimeout(() => {
                animationFinished = true;
                checkReadyState();
              }, 800); 
            }
          }, 250 * index); 
        });
    
        // iOS Strategy: Handle as a direct redirect for Fullscreen Standalone
        if (isIOS) {
          setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1200);
        }
      }, 500); 
    }

    // 4. THE GATEKEEPER
    // Ensures the app is only shown when branding is done AND data is received.
    function checkReadyState() {
      if (animationFinished && scriptLoaded) {
        loader.classList.add('hidden');
        frame.classList.add('active');
        console.log("Tenora SaaS: Hand-off complete.");
      } else if (animationFinished && !scriptLoaded) {
        // Internet is slow. Maintain professional loader.
        document.getElementById('tag3').innerText = "Connecting...";
      }
    }

    window.addEventListener('load', runAnimations);
  </script>
</body>
</html>
