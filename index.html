<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <link rel="apple-touch-startup-image" href="Tenora Icon.jpg"> 
  <meta name="theme-color" content="#2c3e50">

  <style>
    /* Critical CSS: Painted instantly */
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #ffffff; }

    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }

    .tagline-container { text-align: center; color: white; }
    .tag {
      display: block; font-size: 13px; font-weight: 300; letter-spacing: 0.4em;
      text-transform: uppercase; margin: 12px 0; 
      opacity: 0; /* Start hidden */
      transform: translateY(10px);
      transition: all 0.5s cubic-bezier(0.2, 0, 0, 1); 
    }
    .tag.visible { opacity: 0.8; transform: translateY(0); }

    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0;
    }
    iframe.active { opacity: 1; transition: opacity 0.8s ease; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtswzQfmFNspjOvb2RyANolbfnU9zJrUmCdkN5U9uZU58g0QF-ZAJlBtywGg9rDT4q/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;

    // 1. FAST TRIGGER: Start loading the iframe immediately
    const frame = document.getElementById('appFrame');
    if (!isIOS) {
      frame.src = SCRIPT_URL;
      frame.onload = () => { 
        scriptLoaded = true; 
        checkReadyState(); 
      };
    }

    // 2. IMMEDIATE ANIMATION: Runs as soon as the browser reads this line
    // We don't wait for 'load' or 'DOMContentLoaded'
    (function runInstantAnimations() {
      const tags = [
        document.getElementById('tag1'), 
        document.getElementById('tag2'), 
        document.getElementById('tag3')
      ];
    
      tags.forEach((tag, index) => {
        // Reduced initial delay to 50ms to ensure the gradient paints first
        setTimeout(() => { 
          tag.classList.add('visible'); 
          if(index === 2) {
            setTimeout(() => {
              animationFinished = true;
              checkReadyState();
            }, 600); // Time for the last word to settle
          }
        }, 50 + (250 * index)); 
      });
  
      if (isIOS) {
        // iOS Redirect happens mid-animation for a seamless feel
        setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1100);
      }
    })();

    function checkReadyState() {
      // The app only reveals if the animation is done AND the script is ready
      if (animationFinished && (scriptLoaded || isIOS)) {
        document.getElementById('gradient-loader').classList.add('hidden');
        frame.classList.add('active');
      }
    }
  </script>
</body>
</html>
