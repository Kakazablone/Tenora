<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* 1. BASE: White start to match OS Splash */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }

    /* 2. GRADIENT LOADER: The Primary Branding Layer */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; 
      /* Extra long transition for the final 'Ease In' */
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    
    .tag {
      display: block; 
      font-size: 13px; 
      font-weight: 300; 
      letter-spacing: 0.5em;
      text-transform: uppercase; 
      margin: 18px 0; 
      opacity: 0; 
      transform: translateY(20px);
      /* Cinematic slow entrance */
      transition: opacity 1.5s ease-out, transform 1.2s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    /* Active State for Entrance */
    .tag.visible { opacity: 0.75; transform: translateY(0); }

    /* 3. FLOAT ANIMATION: Visual 'Heartbeat' while waiting for Script */
    .tag.floaty {
      animation: floatBreath 4s ease-in-out infinite;
    }

    @keyframes floatBreath {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(-6px); opacity: 0.95; }
    }

    /* 4. THE LIVE APP: Scaled slightly for a zoom-out reveal */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.03);
      transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.2, 0, 0, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQ5pB2vbgJ9dIGLenX3Gt2kg3KioQMXarK2YUAk3ES9OYv742K81QfH9ZJtQV4jH3-/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // --- STEP 1: PARALLEL SCRIPT FETCH ---
    if (!isIOS) { 
      frame.src = SCRIPT_URL; 
      frame.onload = () => {
        scriptLoaded = true;
        checkReadyState();
      };
    }

    // --- STEP 2: IMMEDIATE CINEMATIC ANIMATION ---
    // Using DOMContentLoaded to ensure we start the millisecond the HTML is parsed
    document.addEventListener('DOMContentLoaded', function() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
    
      // Start almost instantly (80ms) to take over from OS splash
      tags.forEach((tag, index) => {
        setTimeout(() => { 
          tag.classList.add('visible'); 
          
          // Initiate floating 'breath' loop after words settle
          setTimeout(() => { tag.classList.add('floaty'); }, 1500);

          if(index === 2) {
            // Wait 2 seconds after "Confidence" appears before allowing the hand-off
            setTimeout(() => {
              animationFinished = true;
              checkReadyState();
            }, 2000); 
          }
        }, 80 + (500 * index)); // 500ms stagger buys time for the iframe
      });
  
      if (isIOS) {
        // iOS standalone redirect logic
        setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1500);
      }
    });

    // --- STEP 3: THE SEAMLESS HAND-OFF ---
    function checkReadyState() {
      // Requirements: Animation sequence completed AND Script has responded
      if (animationFinished && scriptLoaded) {
        
        // Cinematic cross-fade
        loader.style.opacity = "0";
        frame.classList.add('active');

        // Clean the DOM after transition finishes
        setTimeout(() => {
          loader.style.display = "none";
        }, 1600);
      }
      // Note: If script is slow, we simply hold on the 'Floaty' animation indefinitely
    }
  </script>
</body>
</html>
