<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* 1. BASE: Match OS Splash White to prevent any flicker */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background: #ffffff; 
      font-family: -apple-system, sans-serif; 
    }

    /* 2. GRADIENT LOADER: Sits on top */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; 
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    
    .tag {
      display: block; 
      font-size: 13px; 
      font-weight: 300; 
      letter-spacing: 0.5em;
      text-transform: uppercase; 
      margin: 18px 0; 
      opacity: 0; 
      transform: translateY(20px);
      /* Cinematic slow fade-in */
      transition: opacity 1.5s ease-out, transform 1.2s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    /* Reveal state */
    .tag.visible { opacity: 0.7; transform: translateY(0); }

    /* 3. FLOAT ANIMATION: Keeps user attention while script loads */
    .tag.floaty {
      animation: floatBreath 4s ease-in-out infinite;
    }

    @keyframes floatBreath {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50% { transform: translateY(-6px); opacity: 0.9; }
    }

    /* 4. THE APP FRAME: Scales in slightly for an 'ease-in' effect */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.03);
      transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.2, 0, 0, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtswzQfmFNspjOvb2RyANolbfnU9zJrUmCdkN5U9uZU58g0QF-ZAJlBtywGg9rDT4q/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // --- STEP 1: PARALLEL SCRIPT START ---
    if (!isIOS) { 
      frame.src = SCRIPT_URL; 
      frame.onload = () => {
        scriptLoaded = true;
        checkReadyState();
      };
    }

    // --- STEP 2: IMMEDIATE ANIMATION TRIGGER ---
    // We start as soon as the HTML is parsed, don't wait for images/load
    document.addEventListener('DOMContentLoaded', function() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
    
      // Start almost immediately (50ms) to replace the OS splash
      tags.forEach((tag, index) => {
        setTimeout(() => { 
          tag.classList.add('visible'); 
          
          // Once a word has settled, make it start floating
          setTimeout(() => { tag.classList.add('floaty'); }, 1500);

          if(index === 2) {
            setTimeout(() => {
              animationFinished = true;
              checkReadyState();
            }, 2000); // We've now bought roughly 4-5 seconds total
          }
        }, 50 + (500 * index)); // 500ms stagger buys time but feels intentional
      });
  
      if (isIOS) {
        setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1500);
      }
    });

    // --- STEP 3: THE SEAMLESS CROSS-FADE ---
    function checkReadyState() {
      // Transition only when the animation sequence is done AND the script is ready
      if (animationFinished && scriptLoaded) {
        
        // Loader fades to 0
        loader.style.opacity = "0";
        
        // App frame fades to 1 and scales to normal
        frame.classList.add('active');

        // Cleanup DOM after the 1.5s cross-fade
        setTimeout(() => {
          loader.style.display = "none";
        }, 1600);
      } else if (animationFinished && !scriptLoaded) {
        // Optional: Change the last tag if the internet is extremely slow
        document.getElementById('tag3').innerText = "Connecting...";
      }
    }
  </script>
</body>
</html>
