<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    /* 1. BASE: White start to match OS Splash */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }

    /* 2. GRADIENT LOADER: The Primary Branding Layer */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; 
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    
    .tag {
      display: block; 
      font-size: 13px; 
      font-weight: 300; 
      letter-spacing: 0.5em;
      text-transform: uppercase; 
      margin: 18px 0; 
      opacity: 0; 
      transform: translateY(20px);
      transition: opacity 1.5s ease-out, transform 1.2s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    .tag.visible { opacity: 0.75; transform: translateY(0); }

    .tag.floaty {
      animation: floatBreath 4s ease-in-out infinite;
    }

    @keyframes floatBreath {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(-6px); opacity: 0.95; }
    }

    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.03);
      transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.2, 0, 0, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>
  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>
  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUl9Tybfak94DNNNfbxRHY4uR59tVoiR4B8YGuaA9oHbHpPP-JzcxVrcgKbQqCJF2g/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // --- NEW: THE SAAS BACK-BUTTON TRAP ---
    // This creates a history state that "traps" the hardware back button
    function armBackTrap() {
      if (window.history.state === null || window.history.state.path !== 'app') {
        window.history.pushState({ path: 'app' }, '', '');
      }
    }

     window.onpopstate = function(event) {
      // Signal the internal Google Script to handle back-navigation (close modals/forms)
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage('HARDWARE_BACK_CLICKED', '*');
      }
      // Re-arm the trap immediately so the user stays on this page
      armBackTrap();
    };
  
    // --- 2. THE SIGNAL RECEIVER ---
    // Listens for messages coming UP from the Google Script iframe
    window.addEventListener('message', function(event) {
      // LOGOUT LOGIC: If the script says logout is happening, clear the 'Fast-Pass'
      if (event.data === 'USER_LOGOUT_SIGNAL') {
        console.log("Tenora Wrapper: Resetting session for fresh login.");
        sessionStorage.removeItem('tenora_session_active');
      }
      
      // FUTURE PROOF: You can add other signals here if needed 
      // (e.g., trigger a phone vibration, change theme color, etc.)
    });
    
    // --- NEW: THE FAST-PASS RESUMPTION LOGIC ---
    function checkResumption() {
      const lastSession = sessionStorage.getItem('tenora_session_active');
      // If active in the last 30 minutes, skip animations entirely
      const isResuming = lastSession && (Date.now() - parseInt(lastSession) < 1800000);

      if (isResuming) {
        // Skip splash sequence for instant UI
        loader.style.transition = 'none';
        loader.style.display = 'none';
        animationFinished = true;
      } else {
        // Run standard cinematic sequence
        runCinematicSequence();
      }
      
      // Update session activity
      sessionStorage.setItem('tenora_session_active', Date.now().toString());
    }

    function runCinematicSequence() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
      tags.forEach((tag, index) => {
        setTimeout(() => { 
          tag.classList.add('visible'); 
          setTimeout(() => { tag.classList.add('floaty'); }, 1500);
          if(index === 2) {
            setTimeout(() => {
              animationFinished = true;
              checkReadyState();
            }, 2000); 
          }
        }, 80 + (500 * index));
      });
    }

    // --- STEP 1: PARALLEL SCRIPT FETCH ---
    if (!isIOS) { 
      frame.src = SCRIPT_URL; 
      frame.onload = () => {
        scriptLoaded = true;
        checkReadyState();
      };
    } else {
      // iOS Direct Path
      setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1500);
    }

    // --- STEP 2: INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', function() {
      armBackTrap();
      checkResumption();
      checkReadyState(); // Try early reveal if fast-pass is active
    });

    // --- STEP 3: THE SEAMLESS HAND-OFF ---
    function checkReadyState() {
      if (animationFinished && scriptLoaded) {
        loader.style.opacity = "0";
        frame.classList.add('active');
        setTimeout(() => {
          loader.style.display = "none";
        }, 1600);
      }
    }
  </script>
</body>
</html>
