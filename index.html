<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <meta name="theme-color" content="#2c3e50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    /* 1. BASE: Match brand dark to hide any gaps */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; background: #2c3e50; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    }

    /* 2. GRADIENT LOADER */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; 
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    .tagline-container { text-align: center; color: white; padding-bottom: 20px; }
    
    .tag {
      display: block; font-size: 13px; font-weight: 300; letter-spacing: 0.5em;
      text-transform: uppercase; margin: 18px 0; opacity: 0; 
      transform: translateY(20px);
      transition: opacity 1.5s ease-out, transform 1.2s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    .tag.visible { opacity: 0.75; transform: translateY(0); }
    .tag.floaty { animation: floatBreath 4s ease-in-out infinite; }

    @keyframes floatBreath {
      0%, 100% { transform: translateY(0); opacity: 0.75; }
      50% { transform: translateY(-6px); opacity: 0.95; }
    }

    /* 3. IFRAME: Starts hidden and scaled */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; opacity: 0; transform: scale(1.03);
      background: #2c3e50; /* Match background */
      transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.2, 0, 0, 1);
    }
    iframe.active { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>
  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>
  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxN7MD7j0nJFpWrWMDamUV7wNGNN9ZgJU4O83gpTBZ2lWpnNzyV21-f9uZc1stDmcmE/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationFinished = false;
    let scriptLoaded = false;
    let gasReadySignalReceived = false; // THE MASTER LOCK

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // --- 1. THE SIGNAL RECEIVER ---
    window.addEventListener('message', function(event) {
      if (event.data === 'TENORA_APP_READY') {
        console.log("Wrapper: GAS Signal Received.");
        gasReadySignalReceived = true;
        
        // Push params as usual
        const queryString = window.location.search;
        if (queryString && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'URL_PARAMS_SYNC', params: queryString }, '*');
        }
        
        // CHECK FOR REVEAL
        checkReadyState();
      }

      if (event.data === 'USER_LOGOUT_SIGNAL') {
        sessionStorage.removeItem('tenora_session_active');
      }
    });
    
    // --- 2. SCRIPT LOADING ---
    function loadScript() {
      const queryString = window.location.search; 
      const urlParams = new URLSearchParams(queryString);
      const isTenant = urlParams.get('mode') === 'sign';
    
      if (isTenant || isIOS) { 
        window.location.replace(SCRIPT_URL + queryString);
      } else {
        frame.src = SCRIPT_URL; 
        frame.onload = () => {
          scriptLoaded = true;
          // Note: We no longer call checkReadyState here. 
          // We wait for the message from inside the GAS app instead.
          
          // SAFETY FALLBACK: If GAS crashes, reveal in 7 seconds
          setTimeout(() => {
            if (!gasReadySignalReceived) {
              console.warn("Wrapper: Signal Timeout. Forcing Reveal.");
              gasReadySignalReceived = true;
              checkReadyState();
            }
          }, 7000);
        };
      }
    }
    
    // --- 3. ANIMATION SEQUENCE ---
    function runCinematicSequence() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
      tags.forEach((tag, index) => {
        setTimeout(() => { 
          tag.classList.add('visible'); 
          setTimeout(() => { tag.classList.add('floaty'); }, 1500);
          if(index === 2) {
            setTimeout(() => {
              console.log("Wrapper: Animation sequence finished.");
              animationFinished = true;
              checkReadyState();
            }, 2000); 
          }
        }, 80 + (500 * index));
      });
    }

    // --- 4. THE HAND-OFF LOGIC ---
    function checkReadyState() {
      // THE DEPENDENCY LOCK: Both MUST be true
      if (animationFinished && gasReadySignalReceived) {
        loader.style.opacity = "0";
        frame.classList.add('active');
        setTimeout(() => {
          loader.style.display = "none";
        }, 1600);
      }
    }

    // --- 5. INITIALIZATION ---
    function checkResumption() {
      const lastSession = sessionStorage.getItem('tenora_session_active');
      const isResuming = lastSession && (Date.now() - parseInt(lastSession) < 1800000);
      if (isResuming) {
        loader.style.display = 'none';
        animationFinished = true;
        gasReadySignalReceived = true; // Skip lock on refresh
      } else {
        runCinematicSequence();
      }
      sessionStorage.setItem('tenora_session_active', Date.now().toString());
    }

    loadScript();
    document.addEventListener('DOMContentLoaded', () => {
      checkResumption();
      checkReadyState(); 
    });
  </script>
</body>
</html>
