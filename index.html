<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tenora</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="Tenora Icon.jpg">
  <link rel="apple-touch-startup-image" href="Tenora Icon.jpg"> 
  <meta name="theme-color" content="#2c3e50">

  <style>
    /* 1. PREVENT WHITE FLASH: The base of the whole page is now your theme color */
    body, html { 
      margin: 0; padding: 0; height: 100%; width: 100%; 
      overflow: hidden; 
      background-color: #2c3e50; /* Match theme exactly */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. GRADIENT LOADER: Sits on top */
    #gradient-loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #2c3e50, #18bc9c) fixed;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; 
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth cross-fade */
    }

    .tagline-container { text-align: center; color: white; }
    
    .tag {
      display: block; font-size: 13px; font-weight: 300; letter-spacing: 0.4em;
      text-transform: uppercase; margin: 15px 0; 
      opacity: 0; 
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.2, 0, 0, 1); 
    }
    
    .tag.visible { opacity: 0.8; transform: translateY(0); }

    /* 3. THE IFRAME: Starts invisible and scaled up slightly */
    iframe { 
      position: absolute; top: 0; left: 0; border: none; width: 100vw; height: 100vh; 
      z-index: 10; 
      opacity: 0; 
      transform: scale(1.05);
      transition: opacity 1.2s ease, transform 1.2s cubic-bezier(0.2, 0, 0, 1);
      pointer-events: none; /* Disable interaction until visible */
    }
    
    /* Reveal state */
    iframe.active { 
      opacity: 1; 
      transform: scale(1); 
      pointer-events: all;
    }
  </style>
</head>
<body>

  <div id="gradient-loader">
    <div class="tagline-container">
      <span class="tag" id="tag1">Control</span>
      <span class="tag" id="tag2">Clarity</span>
      <span class="tag" id="tag3">Confidence</span>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxtswzQfmFNspjOvb2RyANolbfnU9zJrUmCdkN5U9uZU58g0QF-ZAJlBtywGg9rDT4q/exec";
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    let animationDone = false;
    let scriptReady = false;

    const frame = document.getElementById('appFrame');
    const loader = document.getElementById('gradient-loader');

    // --- STEP 1: LOAD SCRIPT IMMEDIATELY ---
    if (!isIOS) {
      frame.src = SCRIPT_URL;
      frame.onload = () => {
        scriptReady = true;
        checkHandOff();
      };
    }

    // --- STEP 2: START ANIMATION IMMEDIATELY ---
    // We run this as an IIFE so it doesn't wait for any "load" events
    (function runSequence() {
      const tags = [document.getElementById('tag1'), document.getElementById('tag2'), document.getElementById('tag3')];
      
      // Delay first word just slightly (200ms) to allow OS Splash to fade
      tags.forEach((tag, index) => {
        setTimeout(() => {
          tag.classList.add('visible');
          
          // Once the last word "Confidence" is settled:
          if (index === 2) {
            setTimeout(() => {
              animationDone = true;
              checkHandOff();
            }, 1000); // Hold the "Confidence" state for 1s
          }
        }, 200 + (400 * index));
      });

      if (isIOS) {
        setTimeout(() => { window.location.replace(SCRIPT_URL); }, 1500);
      }
    })();

    // --- STEP 3: THE HAND-OFF (The "Ease In") ---
    function checkHandOff() {
      // Logic: Only transition if the animation is finished AND the script is loaded.
      // If the script is slow, it will "hold" on the final animation frame.
      if (animationDone && scriptReady) {
        
        // Ease out the loader
        loader.style.opacity = "0";
        
        // Ease in the app frame
        frame.classList.add('active');

        // Cleanup DOM after fade
        setTimeout(() => {
          loader.style.display = "none";
        }, 1200);
      }
    }
  </script>
</body>
</html>
